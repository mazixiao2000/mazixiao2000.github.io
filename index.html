<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 画廊级极简主义重置 & 换成高级暗夜猩红 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #140102; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #0c0001; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 30;
      border-bottom: 1px solid #250306; 
    }
    .profile-info h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .profile-info p {
      font-size: 11px;
      letter-spacing: 1px;
      color: #7d6264; 
      text-transform: uppercase;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #7d6264;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #b59fa1;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .contact-info a:hover {
      color: #ffffff;
    }

    /* 主体网格容器 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #140102;
    }

    /* --- 3. 左侧一级菜单栏（3D 舞台） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #250306;
      background-color: #110102;
      z-index: 25;
      perspective: 1000px; 
      box-shadow: 20px 0 45px rgba(0, 0, 0, 0.9); 
    }
    
    .project-item {
      height: 20%; 
      width: 100%;
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #210305;
      background-color: #0d0102;
      opacity: 0.35; 
      transform-style: preserve-3d;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-item:last-child {
      border-bottom: none;
    }
    .project-item:hover, .project-item.active {
      opacity: 1; 
      z-index: 50; 
    }
    
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      pointer-events: none; 
      border: 1px solid rgba(255, 255, 255, 0);
      box-shadow: 0 0px 0px rgba(0, 0, 0, 0);
      transition: border 0.4s ease, box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.95);
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      filter: grayscale(15%);
      transform: translateZ(0px) scale(1.02);
      transition: filter 0.8s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-item:hover img {
      filter: grayscale(0%);
      transform: translateZ(45px) scale(1.1); 
    }

    /* --- 4. 右侧展示区与 3D 大图区 --- */
    .right-panel {
      width: 75%;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      background-color: #140102;
    }
    
    .detail-view {
      flex: 1; 
      background-color: #0e0102;
      overflow: hidden;
      position: relative; 
      perspective: 1200px;
      cursor: pointer; /* 鼠标移上去显示指针，提示可以点击进入详情 */
    }
    
    /* 提示进入多页面的小悬浮标签 */
    .enter-badge {
      position: absolute;
      top: 30px;
      right: 30px;
      background: rgba(20, 1, 2, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.8);
      z-index: 20;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .detail-view:hover .enter-badge {
      background: #ffffff;
      color: #140102;
      border-color: #ffffff;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .media-container {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .detail-view img, .detail-view video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; 
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
      transform: translateZ(0px);
    }
    .detail-view .active-media {
      opacity: 1;
      pointer-events: auto;
    }

    /* 悬浮叠层文字排版 */
    .text-overlay {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 90px 40px 40px 40px;
      background: linear-gradient(to top, rgba(5, 0, 0, 0.98) 0%, rgba(5, 0, 0, 0.5) 60%, rgba(0, 0, 0, 0) 100%);
      z-index: 10;
      pointer-events: none; 
      transform-style: preserve-3d;
      transform: translateZ(60px); 
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .text-overlay-content {
      max-width: 800px; 
    }
    .text-overlay h2 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }
    .text-overlay p {
      font-size: 12px;
      line-height: 1.8;
      color: #cccccc;
      font-weight: 300;
      letter-spacing: 0.3px;
      text-shadow: 0 3px 10px rgba(0,0,0,0.8);
    }

    /* 左右隐形触控热区（调整权重，让其中间留出空隙触发大图点击） */
    .click-zone {
      position: absolute;
      top: 0;
      width: 20%;
      height: 100%;
      z-index: 15;
      cursor: pointer;
    }
    .click-zone-left { left: 0; }
    .click-zone-right { right: 0; }

    /* --- 5. 底部级联缩略图横行 --- */
    .thumbnail-panel {
      height: 20%; 
      width: 100%;
      display: flex;
      background-color: #0c0001;
      overflow: visible; 
      flex-shrink: 0;
      border-top: 1px solid #250306;
      perspective: 1000px;
    }
    .thumb-item {
      flex: 1; 
      height: 100%;
      cursor: pointer;
      position: relative;
      opacity: 0.3; 
      border-right: 1px solid #1f0204; 
      transform-style: preserve-3d;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .thumb-item:last-child {
      border-right: none;
    }
    .thumb-item:hover, .thumb-item.active-thumb {
      opacity: 1;
      z-index: 40;
    }
    
    .thumb-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0);
      box-shadow: 0 0px 0px rgba(0, 0, 0, 0);
      transition: border 0.4s ease, box-shadow 0.5s ease;
    }
    .thumb-item:hover .thumb-item-card,
    .thumb-item.active-thumb .thumb-item-card {
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.85);
    }

    .thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translateZ(0px) scale(1.02);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .thumb-item:hover img {
      transform: translateZ(25px) scale(1.08); 
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>Level Design / Game Design Portfolio</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="项目一封面">
        </div>
      </div>
      <div class="project-item" data-id="project2">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=12" alt="项目二封面">
        </div>
      </div>
      <div class="project-item" data-id="project3">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=13" alt="项目三封面">
        </div>
      </div>
      <div class="project-item" data-id="project4">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=14" alt="项目四封面">
        </div>
      </div>
      <div class="project-item" data-id="project5">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=15" alt="项目五封面">
        </div>
      </div>
    </div>

    <div class="right-panel">
      
      <div class="detail-view" id="detailViewStage">
        <div class="enter-badge">点击进入详情 VIEW CASE ➔</div>
        
        <div class="click-zone click-zone-left" id="zoneLeft"></div>
        <div class="click-zone click-zone-right" id="zoneRight"></div>

        <div class="media-container" id="mediaContainer">
          <img id="targetImage" class="active-media" src="" alt="大图展示">
          <video id="targetVideo" controls autoplay loop muted src=""></video>
        </div>

        <div class="text-overlay" id="textOverlay">
          <div class="text-overlay-content">
            <h2 id="targetTitle">LOADING...</h2>
            <p id="targetDesc">LOADING DESCRIPTION...</p>
          </div>
        </div>
      </div>

      <div class="thumbnail-panel" id="thumbnailPanel">
        <div class="thumb-item active-thumb" data-idx="0"><div class="thumb-item-card"><img src="" alt="缩略图1"></div></div>
        <div class="thumb-item" data-idx="1"><div class="thumb-item-card"><img src="" alt="缩略图2"></div></div>
        <div class="thumb-item" data-idx="2"><div class="thumb-item-card"><img src="" alt="缩略图3"></div></div>
        <div class="thumb-item" data-idx="3"><div class="thumb-item-card"><img src="" alt="缩略图4"></div></div>
        <div class="thumb-item" data-idx="4"><div class="thumb-item-card"><img src="" alt="缩略图5"></div></div>
      </div>

    </div>

  </div>

  <script>
    const projectData = {
      project1: {
        title: "01 / 核心关卡动线规划",
        desc: "核心关卡动线规划与多路径垂直空间探索流向。探讨主要视线引导及关键资源点的交织排布，点击大图进入独立拆解详情页。",
        media: [
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=102' },
          { type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' }, 
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=104' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=105' }
        ]
      },
      project2: {
        title: "02 / 隐性光影引导机制",
        desc: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在无UI及全黑匿踪状态下，自然直觉地发现潜行暗道与安全屋区域。",
        media: [
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=202' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=203' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=204' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=205' }
        ]
      },
      project3: {
        title: "03 / 动态环境与复合解谜机制",
        desc: "基于虚幻引擎重构的动态地形解锁与逻辑闭环机制。多维度呈现测试白模阶段的动画演绎，包含触发逻辑条件分支以及多段机关运作细节。",
        media: [
          { type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=302' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=303' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=304' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=305' }
        ]
      },
      project4: {
        title: "04 / 沙盒遭遇战心流曲线",
        desc: "基于动态心流缓释理论设计的敌方AI刷新与战术覆盖包络。通过空间掩体的高低落差分布，保证战斗高潮期与资源搜集舒缓期的优雅交替。",
        media: [
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=402' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=403' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=404' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=405' }
        ]
      },
      project5: {
        title: "05 / 垂直高低差沙盒移动验证",
        desc: "快速推演并验证大型开放立体城市中，钩爪机制、垂直滑索与滑翔翼系统在不同建筑密度、高差倾角下的移动速率、惯性衔接与操作爽感。",
        media: [
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=502' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=503' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=504' },
          { type: 'image', src: 'https://picsum.photos/1920/1080?random=505' }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const targetImage = document.getElementById('targetImage');
      const targetVideo = document.getElementById('targetVideo');
      const targetTitle = document.getElementById('targetTitle');
      const targetDesc = document.getElementById('targetDesc');
      const thumbs = document.querySelectorAll('.thumb-item');
      
      const detailViewStage = document.getElementById('detailViewStage');
      const mediaContainer = document.getElementById('mediaContainer');
      const textOverlay = document.getElementById('textOverlay');

      let currentProjectID = 'project1';
      let currentSubIndex = 0;
      let rotationInterval = null;

      /* ===================================================
         3D 卡牌倾斜计算引擎
         =================================================== */
      function applyTiltEffect(element, maxRotate = 25, scale = 1.12) {
        element.addEventListener('mousemove', (e) => {
          const rect = element.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            element.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        element.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            element.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }

      items.forEach(item => applyTiltEffect(item, 28, 1.12));
      thumbs.forEach(thumb => applyTiltEffect(thumb, 20, 1.08));

      detailViewStage.addEventListener('mousemove', (e) => {
        const rect = detailViewStage.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const xc = x / rect.width - 0.5;
        const yc = y / rect.height - 0.5;
        const rotateX = yc * -10; 
        const rotateY = xc * 10;
        requestAnimationFrame(() => {
          mediaContainer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          textOverlay.style.transform = `translateZ(60px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
      });

      detailViewStage.addEventListener('mouseleave', () => {
        requestAnimationFrame(() => {
          mediaContainer.style.transform = 'rotateX(0deg) rotateY(0deg)';
          textOverlay.style.transform = 'translateZ(60px) rotateX(0deg) rotateY(0deg)';
        });
      });

      /* ===================================================
         页面跳转驱动：点击大图或双击选项跳转到具体页面
         =================================================== */
      function getProjectURL(id) {
        // 映射对应的子页面文件名
        return `${id}.html`; 
      }

      detailViewStage.addEventListener('click', (e) => {
        // 确保点击的不是左右两边的切换盲区
        if (!e.target.classList.contains('click-zone')) {
          window.location.href = getProjectURL(currentProjectID);
        }
      });

      /* ===================================================
         业务核心驱动逻辑
         =================================================== */
      function updateThumbnailSource(projectId) {
        const project = projectData[projectId];
        if (!project) return;
        thumbs.forEach((thumb, idx) => {
          const mediaItem = project.media[idx];
          const imgTag = thumb.querySelector('img');
          if (mediaItem.type === 'video') {
            imgTag.src = 'https://picsum.photos/600/400?random=999'; 
          } else {
            imgTag.src = mediaItem.src;
          }
        });
      }

      function renderSubMedia(projectId, subIndex) {
        const project = projectData[projectId];
        if (!project) return;

        targetTitle.textContent = project.title;
        targetDesc.textContent = project.desc;

        thumbs.forEach((t, idx) => {
          if (idx === subIndex) t.classList.add('active-thumb');
          else t.classList.remove('active-thumb');
        });

        const currentMedia = project.media[subIndex];

        if (currentMedia.type === 'video') {
          targetImage.classList.remove('active-media');
          targetVideo.src = currentMedia.src;
          targetVideo.classList.add('active-media');
          targetVideo.play().catch(e => console.log(e));
        } else {
          targetVideo.classList.remove('active-media');
          targetVideo.pause();
          targetImage.src = currentMedia.src;
          targetImage.classList.add('active-media');
        }
      }

      function startAutoRotation(projectId, startIdx = 0) {
        if (rotationInterval) clearInterval(rotationInterval);
        currentSubIndex = startIdx;
        
        updateThumbnailSource(projectId);
        renderSubMedia(projectId, currentSubIndex);

        rotationInterval = setInterval(() => {
          currentSubIndex = (currentSubIndex + 1) % 5;
          renderSubMedia(projectId, currentSubIndex);
        }, 5000); 
      }

      function resetTimer() {
        startAutoRotation(currentProjectID, currentSubIndex);
      }

      document.getElementById('zoneLeft').addEventListener('click', (e) => {
        e.stopPropagation();
        currentSubIndex = (currentSubIndex - 1 + 5) % 5;
        renderSubMedia(currentProjectID, currentSubIndex);
        resetTimer();
      });

      document.getElementById('zoneRight').addEventListener('click', (e) => {
        e.stopPropagation();
        currentSubIndex = (currentSubIndex + 1) % 5;
        renderSubMedia(currentProjectID, currentSubIndex);
        resetTimer();
      });

      thumbs.forEach(thumb => {
        thumb.addEventListener('click', (e) => {
          e.stopPropagation();
          const idx = parseInt(thumb.getAttribute('data-idx'));
          currentSubIndex = idx;
          renderSubMedia(currentProjectID, currentSubIndex);
          resetTimer();
        });
      });

      items.forEach(item => {
        item.addEventListener('click', () => {
          const projectId = item.getAttribute('data-id');
          if (projectId === currentProjectID) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          currentProjectID = projectId;
          startAutoRotation(projectId, 0);
        });
        
        // 双击左侧列表也可以直接进入详情
        item.addEventListener('dblclick', () => {
          window.location.href = getProjectURL(currentProjectID);
        });
      });

      startAutoRotation('project1', 0);
    });
  </script>
</body>
</html>
