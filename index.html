<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 全局极致主义重置 & 中度冷工业灰调体系 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #2a2a2a; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #2a2a2a;
    }

    /* --- 3. 左侧选项卡栏（修改：改为 6 等分，高雅灰底橙字） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #1a1a1a;
      background-color: #1a1a1a; 
      z-index: 50;
      perspective: 1200px; 
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3); 
    }
    
    .project-item {
      height: 16.666%; /* 修改：6个选项卡平分 100% 高度 */
      width: 108%; 
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      background-color: #222222;
      overflow: visible;
      
      /* 常态偏置：隐藏多出的左边缘 */
      transform: translateX(-7.4%);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      
      /* 退回动画曲线（回程带物理超调弹性） */
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.3s ease, background-color 0.3s ease;
    }
    .project-item:last-child {
      border-bottom: none;
    }
    
    /* 悬停状态（未激活时）：向右顺滑移出（无回弹），增强投影 */
    .project-item:hover {
      transform: translateX(0);
      z-index: 60; 
      box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5); 
      transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    /* 【核心修改1】：激活状态（Active）底色改为与右侧呼应的深灰（#333333），不再刺眼 */
    .project-item.active {
      transform: translateX(0) !important; 
      z-index: 55; 
      background-color: #333333; 
      box-shadow: 8px 8px 25px rgba(0, 0, 0, 0.4);
      transition: background-color 0.3s ease;
    }
    
    /* 【核心修改2】：为激活状态左侧添加一个亮橙色实体UI指示条 */
    .project-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 7.4%; /* 刚好贴在露出界面的最左侧 */
      width: 6px;
      height: 100%;
      background-color: #ff5500;
      z-index: 70;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .project-item.active::before {
      opacity: 1;
    }
    
    /* 3D 卡牌联动容器 */
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      border: 2px solid transparent;
      background-color: transparent;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border 0.25s ease;
    }
    
    .project-item:hover:not(.active) .project-item-card {
      border: 2px solid #ff5500; 
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      display: block;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    
    /* 激活状态下，淡出隐藏原图，使其平滑融入深灰底色 */
    .project-item.active img {
      opacity: 0;
    }

    /* 文本遮罩层 */
    .item-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent; 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 24px;
      text-align: center;
      pointer-events: none;
    }
    
    .item-hover-overlay span {
      color: #ffffff; /* 常态文字：纯白可见 */
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.9), 0 0 10px rgba(0, 0, 0, 0.5); 
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }
    
    .project-item:hover:not(.active) .item-hover-overlay span {
      color: #ff5500;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 1);
    }
    
    /* 【核心修改3】：当卡片激活后，文字变成高亮橙色（#ff5500），无阴影，干净利落 */
    .project-item.active .item-hover-overlay span {
      color: #ff5500; 
      text-shadow: none; 
    }

    /* --- 4. 右侧展示区 --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #333333; 
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    .project-title-area h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #ffffff; 
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #222222; 
      padding: 22px;
      border: 1px solid #444444;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .spec-cell p {
      font-size: 13.5px;
      color: #eeeeee;
      font-weight: 500;
    }

    .detail-section {
      margin-bottom: 65px;
    }
    .detail-section h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      border-left: 4px solid #ff5500; 
      padding-left: 12px;
      color: #ffffff;
    }
    .detail-section p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #cccccc; 
      margin-bottom: 25px;
      text-align: justify;
    }
    
    .highlight-text {
      color: #ff5500;
      font-weight: 600;
    }

    .showcase-block {
      width: 100%;
      border: 1px solid #444444;
      background: #222222;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11.5px;
      color: #999999;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>关卡策划 / 游戏设计</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="封面">
          <div class="item-hover-overlay"><span>星空关卡设计</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project2">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=12" alt="封面">
          <div class="item-hover-overlay"><span>半条命关卡设计</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project3">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=13" alt="封面">
          <div class="item-hover-overlay"><span>UE5多人竞速游戏HamsterBallin‘</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project4">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=14" alt="封面">
          <div class="item-hover-overlay"><span>Unity2d平台跳跃游戏FLING</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project5">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=15" alt="封面">
          <div class="item-hover-overlay"><span>其他项目</span></div>

        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=16" alt="封面">
          <div class="item-hover-overlay"><span>关于我</span></div>
        </div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper">
        </div>
    </div>

  </div>

  <script>
    // 关卡数据库（修改：拓展为对应的 6 个核心内容块）
    const portfolioDatabase = {
      project1: {
        title: "星空关卡设计 / 开放宇宙前哨站动线",
        tag: "Level Design Study / Creation Engine",
        type: "科幻 RPG / 开放沙盒",
        role: "动线规划 / 隐性地标牵引 / 白模测试",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 低重力环境下的垂直动线与探索心流",
            text: "本设计旨在探索低重力场景下玩家的视线盲区与移动习惯。我们通过利用中高照度地标与环境气流，引导玩家在无UI状态下探索错落有致的废弃太空前哨站。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ 图 1.1：低重力前哨站垂直黑箱空间视线阻断推演"
          }
        ]
      },
      project2: {
        title: "半条命关卡设计 / 箱庭式遭遇战与隐性光影",
        tag: "Singleplayer Level / Source 2 Engine",
        type: "第一人称线性射击",
        role: "箱庭解谜 / AI视线包络 / 物理机关交互",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 经典 Cold-Warm 光源引导模型机制",
            text: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在全黑匿踪状态下，自然直觉地发现潜行暗道与战术掩体。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：经典箱庭空间下的交火线与掩体拓扑"
          }
        ]
      },
      project3: {
        title: "UE5 多人竞速游戏 HamsterBallin‘ / 高速度下视差载入与物理碰撞",
        tag: "Multiplayer Racing Game / Unreal Engine 5",
        type: "多人联机 3D 物理竞速",
        role: "关卡动态关卡流 / 极限速率验证 / 赛道盲测",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 高机动惯性运动下的赛道边界红线测试",
            text: "快速推演并验证在极高移动速率、滚动惯性下，赛道弯道弧度、高低落差对玩家操作手感和心流反馈带来的动态冲击。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=301' },
            caption: "▲ 图 3.1：高流速状态下 Stream Loading 的视差加载技术边界验证"
          }
        ]
      },
      project4: {
        title: "Unity 2D 平台跳跃游戏 FLING / 关卡难度阶梯与心流曲线构建",
        tag: "2D Platformer / Unity 3D",
        type: "硬核 2D 动作跳跃",
        role: "物理机制调优 / 障碍矩阵设计 / 关卡盲测迭代",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 基于‘观察-尝试-挫败-精通’的黄金心流循环",
            text: "针对 2D 刚体弹性机制进行微调，通过搭建精准到像素级的跳跃盲道，在前期关卡合理分布安全落脚点与挫败缓释区。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：盲测数据玩家死亡热力图（Heatmap）与难度回归曲线分析"
          }
        ]
      },
      project5: {
        title: "其他项目 / 功能性原型开发与技术验证合集",
        tag: "Prototypes & Game Jams / Multiple Engines",
        type: "独立游戏 / 原型测试",
        role: "全栈开发 / 机制验证 / 快速出样",
        time: "Ongoing",
        sections: [
          {
            heading: "1. 历届 Game Jam 快速白模原型沉淀",
            text: "这里包含了过去参与黑客马拉松及独立开发期间，快速迭代落地的多款实验性玩法核心机制原型，覆盖动态环境改变、连锁状态机等机制。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：复合式解谜触发 logic 与快速验证流程图"
          }
        ]
      },
      project6: {
        title: "关于我 / 马子潇 (Zixiao Ma)",
        tag: "Level Designer / Game Designer",
        type: "简历与专业特长简介",
        role: "关卡策划、核心机制设计",
        time: "2026 Portfolio",
        sections: [
          {
            heading: "专业背景与设计理念说明",
            text: "热爱构建具有深刻沉浸感与扎实物理手感的三维箱庭空间。擅长利用严谨的白模搭建（Blockout）、清晰的视线牵引以及基于玩家行为数据的盲测反馈，去驱动关卡的极致迭代。熟练掌握 Unreal Engine 5、Unity 等主流引擎与核心脚本工具。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=601' },
            caption: "▲ 致力于将最纯粹的游戏心流体验，传递给每一位在黑箱中探索的玩家。"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D 卡牌微倾斜物理引擎（只对未激活的卡牌应用）
         =================================================== */
      function applyTiltEffect(itemElement, cardElement, maxRotate = 14, scale = 1.03) {
        itemElement.addEventListener('mousemove', (e) => {
          if(itemElement.classList.contains('active')) return;
          
          const rect = itemElement.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        
        itemElement.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            cardElement.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      
      items.forEach(item => {
        const card = item.querySelector('.project-item-card');
        applyTiltEffect(item, card, 14, 1.03); 
      });

      /* ===================================================
         2. 长轴多组件内容组装
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="关卡图示">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      /* ===================================================
         3. 选项卡联动切换
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => {
            i.classList.remove('active');
            const c = i.querySelector('.project-item-card');
            if(c) c.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
          
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
