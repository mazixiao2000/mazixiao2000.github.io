<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的个人作品集</title>
  <style>
    /* 基础样式重置 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; /* 禁止整页滚动 */
      background-color: #f8f9fa;
      color: #333;
    }

    /* 1. 顶部个人信息栏 */
    header {
      background-color: #ffffff;
      padding: 20px 40px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0; /* 防止顶部栏被压缩 */
    }
    .profile-info h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }
    .profile-info p {
      font-size: 14px;
      color: #6c757d;
    }
    .contact-info {
      text-align: right;
      font-size: 14px;
      line-height: 1.6;
    }
    .contact-info a {
      color: #007bff;
      text-decoration: none;
    }

    /* 主体内容区域 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden; /* 核心：确保子元素的滚动不影响外层 */
    }

    /* 2. 左侧 1/4 流式滚动条目 */
    .left-panel {
      width: 25%;
      background-color: #ffffff;
      border-right: 1px solid #e9ecef;
      overflow-y: auto; /* 允许纵向流式滚动 */
      padding: 20px;
    }
    .project-item {
      background-color: #f1f3f5;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      border: 2px solid transparent;
    }
    .project-item:hover {
      transform: translateY(-2px);
      border-color: #007bff;
    }
    .project-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      margin-bottom: 8px;
    }
    .project-item p {
      font-size: 14px;
      font-weight: bold;
      text-align: center;
    }

    /* 3. 右侧 3/4 展示区域 */
    .right-panel {
      width: 75%;
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    /* 右上：大图展示 */
    .detail-view {
      flex: 1;
      background-color: #eaeaea;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .detail-view img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    /* 右下：文字说明 */
    .detail-desc {
      height: 35%; /* 占用右侧下半部分 */
      background-color: #ffffff;
      border-top: 1px solid #e9ecef;
      padding: 30px;
      overflow-y: auto; /* 如果文字变多，允许文字区域单独滚动 */
    }
    .detail-desc h2 {
      margin-bottom: 10px;
      font-size: 20px;
    }
    .detail-desc p {
      font-size: 15px;
      line-height: 1.6;
      color: #495057;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>张三 (Your Name)</h1>
      <p>UI/UX 设计师 / 前端开发者 / 摄影师</p>
    </div>
    <div class="contact-info">
      <p>📧 邮箱: your-email@example.com</p>
      <p>🌐 个人主页: <a href="https://mazixiao2000.github.io">mazixiao2000.github.io</a></p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel">
      
      <div class="project-item">
        <img src="https://picsum.photos/400/300?random=1" alt="项目一">
        <p>作品项目一名称</p>
      </div>

      <div class="project-item">
        <img src="https://picsum.photos/400/300?random=2" alt="项目二">
        <p>作品项目二名称</p>
      </div>

      <div class="project-item">
        <img src="https://picsum.photos/400/300?random=3" alt="项目三">
        <p>作品项目三名称</p>
      </div>

      <div class="project-item">
        <img src="https://picsum.photos/400/300?random=4" alt="项目四">
        <p>作品项目四名称</p>
      </div>

      <div class="project-item">
        <img src="https://picsum.photos/400/300?random=5" alt="项目五">
        <p>作品项目五名称</p>
      </div>

    </div>

    <div class="right-panel">
      
      <div class="detail-view">
        <img src="https://picsum.photos/800/600?random=1" alt="选中项目大图">
      </div>

      <div class="detail-desc">
        <h2>选中的作品项目标题</h2>
        <p>这里是项目的具体文字说明占位符。你可以详细描述这个项目的背景、你所使用的技术栈、设计理念以及取得的成果。由于整体页面被锁定了高度，即使这里的文字非常长，也只会在当前这个白色区块内滚动，不会撑坏整个网页的精美布局。</p>
      </div>

    </div>

  </div>

</body>
</html>
