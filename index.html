<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 画廊级极简主义重置 & 换成高级暗夜猩红 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #140102; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #0c0001; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 30;
      border-bottom: 1px solid #250306; 
    }
    .profile-info h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .profile-info p {
      font-size: 11px;
      letter-spacing: 1px;
      color: #7d6264; 
      text-transform: uppercase;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #7d6264;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #b59fa1;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .contact-info a:hover {
      color: #ffffff;
    }

    /* 主体网格容器 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #140102;
    }

    /* --- 3. 左侧一级菜单栏（保持经典 3D 舞台） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #250306;
      background-color: #110102;
      z-index: 25;
      perspective: 1000px; 
      box-shadow: 20px 0 45px rgba(0, 0, 0, 0.9); 
    }
    
    .project-item {
      height: 20%; 
      width: 100%;
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #210305;
      background-color: #0d0102;
      opacity: 0.35; 
      transform-style: preserve-3d;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-item:last-child {
      border-bottom: none;
    }
    .project-item:hover, .project-item.active {
      opacity: 1; 
      z-index: 50; 
    }
    
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      pointer-events: none; 
      border: 1px solid rgba(255, 255, 255, 0);
      box-shadow: 0 0px 0px rgba(0, 0, 0, 0);
      transition: border 0.4s ease, box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.95);
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      filter: grayscale(15%);
      transform: translateZ(0px) scale(1.02);
      transition: filter 0.8s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-item:hover img {
      filter: grayscale(0%);
      transform: translateZ(45px) scale(1.1); 
    }

    /* --- 4. 右侧深度内容展示区（改造成纵向可拉伸的长轴画布） --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #0e0102;
      /* 核心修改：允许内容纵向溢出并滚动 */
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* 优雅地隐藏右侧区域的自带原生滚动条，保持多维界面高级感 */
    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    /* 详情页长轴排版包装器 */
    .detail-content-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 50px 40px 100px 40px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    
    /* 配合切换时的淡入淡出动画类 */
    .content-fade {
      opacity: 0;
    }

    /* 关卡大标题与基本信息规格表 */
    .project-title-area h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #7d6264;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      background: #0c0001;
      padding: 20px;
      border: 1px solid #250306;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #7d6264;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .spec-cell p {
      font-size: 13px;
      color: #eeeeee;
    }

    /* 独立的图文拆解块 */
    .detail-section {
      margin-bottom: 45px;
    }
    .detail-section h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
      border-left: 3px solid #b59fa1;
      padding-left: 12px;
    }
    .detail-section p {
      font-size: 14px;
      line-height: 1.7;
      color: #cccccc;
      margin-bottom: 20px;
      text-align: justify;
    }

    /* 长图文媒体容器 */
    .showcase-block {
      width: 100%;
      border: 1px solid #250306;
      background: #0c0001;
      margin-bottom: 12px;
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11px;
      color: #7d6264;
      text-align: center;
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>Level Design / Game Design Portfolio</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="项目一封面">
        </div>
      </div>
      <div class="project-item" data-id="project2">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=12" alt="项目二封面">
        </div>
      </div>
      <div class="project-item" data-id="project3">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=13" alt="项目三封面">
        </div>
      </div>
      <div class="project-item" data-id="project4">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=14" alt="项目四封面">
        </div>
      </div>
      <div class="project-item" data-id="project5">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=15" alt="项目五封面">
        </div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper">
        </div>
    </div>

  </div>

  <script>
    // 关卡数据池：在这里你可以把每个项目拓展成无限长、包含多张图文的专业复盘文章
    const portfolioDatabase = {
      project1: {
        title: "01 / 核心关卡动线规划",
        tag: "Level Design Case Study / Unreal Engine",
        type: "3D 动作冒险沙盒",
        role: "白模搭建 / 心流曲线设计",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 设计意图与玩家动线平衡（Mission Intent）",
            text: "在此关卡设计中，核心目标是在垂直空间（Verticality）中创造非线性的探索体验。通过高度落差限制玩家早期的视线视野，强迫其使用侧向勾爪动线。这样既可以平滑战斗的心流激昂感，也能给硬核玩家留出跳过战斗的边缘潜行暗道。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ 图 1.1：主干道动线与视线遮挡体（Blockout）空间推演"
          },
          {
            heading: "2. 隐性视线引导与空间地标（Landmark）",
            text: "为了让玩家在长达 15 分钟的无 UI 沉浸状态下不迷失方向，利用了经典的“地标建筑法”。无论玩家跌落到哪一层地下夹缝，只要抬起视角，都能透过天花板的岩石裂缝看到核心高塔的顶端微光。这为玩家在 3D 复杂迷宫中提供了天然的精神锚点。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=102' },
            caption: "▲ 图 1.2：灰模视界测试（灰色空间高对比强光照覆盖反馈）"
          },
          {
            heading: "3. 关卡心流动态演示机制",
            text: "通过下方实际引擎运行视频进行机制多级验证，确认动态解谜中玩家的视线在遭遇巨型机关时的第一反应焦点。",
            media: { type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' },
            caption: "▲ 演示 1.3：物理机关连锁反应闭环测试视频"
          }
        ]
      },
      project2: {
        title: "02 / 隐性光影引导机制",
        tag: "Lighting & Guidance / Frostbite Engine",
        type: "线性写实潜行谍战",
        role: "光照关卡规划 / AI视线控制",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 冷暖光源引导模型机制",
            text: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在无UI及全黑匿踪状态下，自然直觉地发现潜行暗道与安全屋区域。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：高照度强对比下的隐蔽动线视域分析"
          }
        ]
      },
      project3: {
        title: "03 / 动态环境与复合解谜机制",
        tag: "Puzzle Mechanics / Unity 3D",
        type: "第一人称空间解谜",
        role: "关卡触发器逻辑 / 地形状态机",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 基于地形改变的空间闭环设计",
            text: "基于虚幻引擎重构的动态地形解锁与逻辑闭环机制。多维度呈现测试白模阶段的动画演绎，包含触发逻辑条件分支以及多段机关运作细节。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=302' },
            caption: "▲ 图 3.1：地形矩阵变动下的路径连接拓扑图"
          }
        ]
      },
      project4: {
        title: "04 / 沙盒遭遇战心流曲线",
        tag: "Combat Encounter / CryEngine",
        type: "开放世界多人射击",
        role: "沙盒遭遇战规划 / 掩体布局",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 空间掩体错落与敌方AI压制曲线",
            text: "基于动态心流缓释理论设计的敌方AI刷新与战术覆盖包络。通过空间掩体的高低落差分布，保证战斗高潮期与资源搜集舒缓期的优雅交替。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：掩体视线死角与射击交火线空间包络分析"
          }
        ]
      },
      project5: {
        title: "05 / 垂直高低差沙盒移动验证",
        tag: "Movement Mechanics / Unreal Engine 5",
        type: "开放立体大世界赛博风",
        role: "机制手感验证 / 边界极限测试",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 高机动三维运动学关卡推演",
            text: "快速推演并验证大型开放立体城市中，钩爪机制、垂直滑索与滑翔翼系统在不同建筑密度、高差倾角下的移动速率、惯性衔接与操作爽感。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：极限速度移动下关卡视差载入（Stream Loading）边界红线测试"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D 卡牌倾斜计算引擎（完美保留左侧手感）
         =================================================== */
      function applyTiltEffect(element, maxRotate = 25, scale = 1.12) {
        element.addEventListener('mousemove', (e) => {
          const rect = element.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            element.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        element.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            element.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      items.forEach(item => applyTiltEffect(item, 28, 1.12));

      /* ===================================================
         2. 长页面多组件动态装配函数
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        // 构建长轴页面的基本信息头与规格参数表
        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        // 动态迭代加入所有长图文和视频混排模块
        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="展示多媒体">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        // 加上淡入效果并将内容灌入右侧
        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; // 切换项目时，自动将右侧长页面重置拉回最顶端
        }, 150);
      }

      /* ===================================================
         3. 选项卡联动控制核心
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      // 初始化默认载入第一个长项目
      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
