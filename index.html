<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 全局极致主义重置 & 中度冷工业灰调体系 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #2a2a2a; /* 高质感中度工业灰 */
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏（惊艳亮橙） --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #2a2a2a;
    }

    /* --- 3. 左侧选项卡栏（支持原图亮度与平滑抽屉滑出动效） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; /* 必须允许溢出，否则滑出的部分会被遮挡 */
      border-right: 1px solid #1a1a1a;
      background-color: #222222; 
      z-index: 50;
      perspective: 1200px; 
      box-shadow: 10px 0 30px rgba(0, 0, 0, 0.15); 
    }
    
    .project-item {
      height: 20%; 
      width: 100%;
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      background-color: #222222;
      overflow: visible;
      opacity: 1; 
      
      /* 【核心修改】：利用 cubic-bezier 贝塞尔曲线控制滑出与滑回，达到类似苹果系统的丝滑高级感 */
      transform: translateX(0);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .project-item:last-child {
      border-bottom: none;
    }
    
    /* 【核心修改】：当鼠标悬停（Hover）时，让选项卡向右滑出 25% (宽度 1/4) */
    .project-item:hover {
      transform: translateX(25%);
      z-index: 60; 
    }
    .project-item.active {
      z-index: 55; /* 激活项默认层级稍微提一下 */
    }
    
    /* 3D 卡牌联动容器 */
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      border: 0px solid transparent;
      /* 这里负责平滑地还原 3D 倾斜和缩放 */
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1), border 0.25s ease;
    }
    
    /* 激活或悬停状态下的高亮橙色描边 */
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 2px solid #ff5500; 
      box-shadow: -10px 15px 35px rgba(0, 0, 0, 0.5); /* 调整阴影方向配合向右滑出 */
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      display: block;
      filter: none; 
    }

    /* 文本遮罩控制层 */
    .item-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8); 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 20px;
      text-align: center;
      opacity: 0; 
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    
    /* 悬停（Hover）或当前激活（Active）时，显示标题文字黑框 */
    .project-item:hover .item-hover-overlay,
    .project-item.active .item-hover-overlay {
      opacity: 1; 
    }
    
    .item-hover-overlay span {
      color: #ff5500; 
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* --- 4. 右侧展示区（哑光低噪灰） --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #333333; 
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* 隐藏右侧原生滚动条 */
    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    /* 详情页排版包装器 */
    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    /* 关卡大标题与参数表 */
    .project-title-area h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #ffffff; 
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #222222; 
      padding: 22px;
      border: 1px solid #444444;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .spec-cell p {
      font-size: 13.5px;
      color: #eeeeee;
      font-weight: 500;
    }

    /* 独立的图文拆解块 */
    .detail-section {
      margin-bottom: 65px;
    }
    .detail-section h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      border-left: 4px solid #ff5500; 
      padding-left: 12px;
      color: #ffffff;
    }
    .detail-section p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #cccccc; 
      margin-bottom: 25px;
      text-align: justify;
    }
    
    /* 关键设计亮点修饰符 */
    .highlight-text {
      color: #ff5500;
      font-weight: 600;
    }

    /* 媒体展示容器 */
    .showcase-block {
      width: 100%;
      border: 1px solid #444444;
      background: #222222;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11.5px;
      color: #999999;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>关卡策划 / 游戏设计</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="项目一封面">
          <div class="item-hover-overlay"><span>01 / 核心关卡动线规划</span></div>

        <div class="project-item-card">

    </div>

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper">
        </div>
    </div>

  </div>

  <script>
    // 关卡数据库
    const portfolioDatabase = {
      project1: {
        title: "01 / 核心关卡动线规划与多路径拆解",
        tag: "Level Design Case Study / Unreal Engine",
        type: "3D 动作冒险沙盒",
        role: "白模搭建 / 心流曲线 / 视线阻断",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 关卡核心设计意图与心流包络（Mission Intent）",
            text: "在此关卡设计中，核心目标是在高密度垂直空间中创造非线性的探索体验。我们拒绝了传统大世界平铺直叙的铺设，转而采用高度落差限制玩家早期的视线视野。通过强迫其使用侧向勾爪动线，平滑战斗遭遇前的紧张感，并为核心硬核潜行玩家留出了无伤绕过主战区的<span class='highlight-text'>边缘盲道</span>。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ 图 1.1：主干道动线与视线遮挡体（Blockout）空间结构推演"
          },
          {
            heading: "2. 隐性地标锚定法与三维视线引导（Landmark & Guidance）",
            text: "为了让玩家在长达 15 分钟的无 UI 沉浸状态下不产生迷失感，本关卡重度利用了“三维地标法”。无论玩家在战斗中跌落到哪一层地下裂缝，只要抬起视角，都能透过精心计算的岩石错位裂隙，直观看到核心高塔的顶端微光。这种<span class='highlight-text'>隐性视线牵引</span>在 3D 复杂黑箱空间中提供了极为稳固的心理锚点。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=102' },
            caption: "▲ 图 1.2：灰模阶段视界载入与明暗对比度（High Contrast）测试"
          },
          {
            heading: "3. 物理环境交互与闭环逻辑验证",
            text: "关卡中段引入了一组具有连锁反应的复合几何机关。玩家需要通过重力箱体触发底层泄洪闸，进而利用浮力升起通路。以下视频展示了白模测试阶段针对触发器边界、物理状态机衔接流利度的<span class='highlight-text'>手感极限测试</span>。",
            media: { type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' },
            caption: "▲ 演示 1.3：虚幻引擎环境白模触发逻辑与物理碰撞闭环演示"
          },
          {
            heading: "4. 战斗遭遇战（Encounter）空间战术包络",
            text: "遭遇战区域采用了经典的“下沉式斗兽场”与“高台狙击位”的复合布局。敌方 AI 刷新点被隐藏在视野盲区的双层回廊后。通过提供 3 处可破坏的悬挂重物环境物，引导玩家形成<span class='highlight-text'>‘观察-规划-潜入-爆发战斗’</span>的经典战术循环，避免陷入纯粹的消耗战。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=103' },
            caption: "▲ 图 1.4：遭遇战交火线（Fire-line）与掩体密度分布拓扑图"
          },
          {
            heading: "5. 可迭代性优化盲测数据（Post-Mortem）",
            text: "经过玩家的盲测数据反馈，原先第三阶段的滑索动线因倾角过陡，导致玩家容易产生视觉眩晕。团队随后在迭代中将滑索倾角放缓，并在动线中点增设了一个承托式的悬空木质脚手架作为<span class='highlight-text'>手感缓释区</span>，使得整体心流体验回归预期黄金线。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=104' },
            caption: "▲ 图 1.5：盲测热力图数据（Heatmap）与玩家挫败感峰值区间修正对比"
          }
        ]
      },
      project2: {
        title: "02 / 隐性光影引导机制与AI视线包络",
        tag: "Lighting & Guidance / Frostbite Engine",
        type: "线性写实潜行谍战",
        role: "光照关卡规划 / AI视线控制",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. Cold-Warm 光源引导模型机制",
            text: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在无UI及全黑匿踪状态下，自然直觉地发现潜行暗道与安全屋区域。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：高照度强对比下的隐蔽动线视域分析"
          }
        ]
      },
      project3: {
        title: "03 / 动态环境与复合解谜机制",
        tag: "Puzzle Mechanics / Unity 3D",
        type: "第一人称空间解谜",
        role: "关卡触发器逻辑 / 地形状态机",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 基于地形改变的空间闭环设计",
            text: "基于虚幻引擎重构的动态地形解锁与逻辑闭环机制。多维度呈现测试白模阶段的动画演绎，包含触发 logic 条件分支以及多段机关运作细节。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=302' },
            caption: "▲ 图 3.1：地形矩阵变动下的路径连接拓扑图"
          }
        ]
      },
      project4: {
        title: "04 / 沙盒遭遇战心流曲线",
        tag: "Combat Encounter / CryEngine",
        type: "开放世界多人射击",
        role: "沙盒遭遇战规划 / 掩体布局",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 空间掩体错落与敌方 AI 压制曲线",
            text: "基于动态心流缓释理论设计的敌方 AI 刷新与战术覆盖包络。通过空间掩体的高低落差分布，保证战斗高潮期与资源搜集舒缓期的优雅交替。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：掩体视线死角与射击交火线空间包络分析"
          }
        ]
      },
      project5: {
        title: "05 / 垂直高低差沙盒移动验证",
        tag: "Movement Mechanics / Unreal Engine 5",
        type: "开放立体大世界赛博风",
        role: "机制手感验证 / 边界极限测试",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 高机动三维运动学关卡推演",
            text: "快速推演并验证大型开放立体城市中，钩爪机制、垂直滑索与滑翔翼系统在不同建筑密度、高差倾角下的移动速率、惯性衔接与操作爽感。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：极限速度移动下关卡视差载入（Stream Loading）边界红线测试"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D 卡牌微倾斜物理引擎（只在卡牌卡面内部运作）
         =================================================== */
      function applyTiltEffect(itemElement, cardElement, maxRotate = 24, scale = 1.05) {
        itemElement.addEventListener('mousemove', (e) => {
          const rect = itemElement.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            // 只对 card 做 3D 旋转和轻微缩放
            cardElement.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        itemElement.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            cardElement.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      
      items.forEach(item => {
        const card = item.querySelector('.project-item-card');
        applyTiltEffect(item, card, 24, 1.05);
      });

      /* ===================================================
         2. 长轴多组件内容组装
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="关卡图示">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        // 柔和切入动效
        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      /* ===================================================
         3. 选项卡联动切换
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      // 初始化载入
      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
