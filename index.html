<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 全局重置与工业灰调体系 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #1a1a1a; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #1a1a1a;
    }

    /* --- 3. 左侧选项卡栏（修改：原图回归 + 鼠标坐标跟随物理折射层） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #262626;
      background-color: #111111;
      z-index: 50;
    }
    
    .project-item {
      height: 16.666%; /* 6等分布局 */
      width: 100%; 
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1f1f1f;
      background-color: #222222;
      overflow: hidden; /* 裁剪边缘 */
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .project-item:last-child {
      border-bottom: none;
    }

    /* 常态下的基础背景图（带轻微暗化，保证文字清晰度） */
    .base-bg-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.5); /* 淡淡显露原图 */
      transition: filter 0.3s ease;
    }
    .project-item:hover .base-bg-img {
      filter: brightness(0.6);
    }
    
    /* 常态下的底层文本标签 */
    .item-text-label {
      position: absolute;
      width: 100%;
      padding: 0 24px;
      text-align: center;
      z-index: 5;
      font-size: 13.5px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: 1px;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* 【核心特效舱】：物理毛玻璃随动镜片 */
    .dynamic-glass-lens {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      
      /* 通过 clip-path 动态裁剪出一个跟随鼠标的圆，这里初始化在左上角 */
      clip-path: circle(0px at 0px 0px);
      
      /* 毛玻璃融合高级反光镀膜 */
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.15);
      
      transition: opacity 0.25s ease;
    }

    /* 毛玻璃透镜内部克隆的放大且模糊的背景原图（折射核心） */
    .lens-refracted-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      
      /* 核心物理滤镜：模糊 + 提高折射饱和与对比 */
      filter: blur(8px) brightness(0.8) saturate(140%) contrast(110%);
      
      /* 凸透镜效果：使镜片内部内容整体比基底放大 1.15 倍 */
      transform: scale(1.15);
      transform-origin: 0px 0px; /* 动态通过JS改写，实现高级光学视差错位 */
    }

    /* 透镜内同步放大的折射文字 */
    .lens-refracted-text {
      position: absolute;
      width: 100%;
      padding: 0 24px;
      text-align: center;
      font-size: 15.5px; /* 光学折射放大感 */
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 1.5px;
      line-height: 1.4;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
      top: 50%;
      transform: translateY(-50%) scale(1.1);
    }

    /* 悬停与激活时激活随动透镜 */
    .project-item:hover .dynamic-glass-lens {
      opacity: 1;
    }

    /* 【确定选中状态】：永久锁在选项卡中央，并产生耀眼的橙色边缘与橙字 */
    .project-item.active {
      transform: scale(1.02);
      box-shadow: 5px 5px 20px rgba(0,0,0,0.4);
      border: 1px solid #ff5500;
    }
    .project-item.active .dynamic-glass-lens {
      opacity: 1;
      /* 点击后不跟随鼠标，通过 JS 的 style 强制拉回中央并扩展成方块或大圆，这里由JS接管 */
    }
    .project-item.active .lens-refracted-text {
      color: #ff5500; /* 折射字变核心工业橙 */
      text-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
    }

    /* --- 4. 右侧展示区 --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #222222; 
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .right-panel::-webkit-scrollbar { width: 0px; background: transparent; }
    .right-panel { -ms-overflow-style: none; scrollbar-width: none; }

    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade { opacity: 0; }

    .project-title-area h2 { font-size: 32px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; color: #ffffff; }
    .project-title-area .sub-tag { font-size: 12px; color: #aaaaaa; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 35px; }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #181818; 
      padding: 22px;
      border: 1px solid #333333;
    }
    .spec-cell h3 { font-size: 11px; color: #ff5500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .spec-cell p { font-size: 13.5px; color: #eeeeee; font-weight: 500; }

    .detail-section { margin-bottom: 65px; }
    .detail-section h4 { font-size: 18px; font-weight: 700; margin-bottom: 18px; letter-spacing: 0.5px; border-left: 4px solid #ff5500; padding-left: 12px; color: #ffffff; }
    .detail-section p { font-size: 14.5px; line-height: 1.8; color: #cccccc; margin-bottom: 25px; text-align: justify; }
    
    .highlight-text { color: #ff5500; font-weight: 600; }

    .showcase-block { width: 100%; border: 1px solid #333333; background: #181818; margin-bottom: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .showcase-block img, .showcase-block video { width: 100%; display: block; height: auto; }
    .showcase-caption { font-size: 11.5px; color: #888888; text-align: center; margin-bottom: 30px; }
  </style>
</head>

    <div class="right-panel" id="rightPanel">

  <script>
    const portfolioDatabase = {
      project1: {
        title: "星空关卡设计 / 开放宇宙前哨站动线",
        tag: "Level Design Study / Creation Engine",
        type: "科幻 RPG / 开放沙盒",
        role: "动线规划 / 隐性地标牵引 / 白模测试",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 低重力环境下的垂直动线与探索心流",
            text: "本设计旨在探索低重力场景下玩家的视线盲区与移动习惯。我们通过利用中高照度地标与环境气流，引导玩家在无UI状态下探索错落有致的废弃太空前哨站。",

            caption: "▲ 图 1.1：低重力前哨站垂直黑箱空间视线阻断推演"
          }
        ]
      },
      project2: {
        title: "半条命关卡设计 / 箱庭式遭遇战与隐性光影",
        tag: "Singleplayer Level / Source 2 Engine",
        type: "第一人称线性射击",
        role: "箱庭解谜 / AI视线包络 / 物理机关交互",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 经典 Cold-Warm 光源引导模型机制",
            text: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在全黑匿踪状态下，自然直觉地发现潜行暗道与战术掩体。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：经典箱庭空间下的交火线与掩体拓扑"
          }
        ]
      },
      project3: {
        title: "UE5 多人竞速游戏 HamsterBallin‘ / 高速度下视差载入与物理碰撞",
        tag: "Multiplayer Racing Game / Unreal Engine 5",
        type: "多人联机 3D 物理竞速",
        role: "关卡动态关卡流 / 极限速率验证 / 赛道盲测",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 高机动惯性运动下的赛道边界红线测试",
            text: "快速推演并验证在极高移动速率、滚动惯性下，赛道弯道弧度、高低落差对玩家操作手感和心流反馈带来的动态冲击。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=301' },
            caption: "▲ 图 3.1：高流速状态下 Stream Loading 的视差加载技术边界验证"
          }
        ]
      },
      project4: {
        title: "Unity 2D 平台跳跃游戏 FLING / 关卡难度阶梯与心流曲线构建",
        tag: "2D Platformer / Unity 3D",
        type: "硬核 2D 动作跳跃",
        role: "物理机制调优 / 障碍矩阵设计 / 关卡盲测迭代",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 基于‘观察-尝试-挫败-精通’的黄金心流循环",
            text: "针对 2D 刚体弹性机制进行微调，通过搭建精准到像素级的跳跃盲道，在前期关卡合理分布安全落脚点与挫败缓释区。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：盲测数据玩家死亡热力图（Heatmap）与难度回归曲线分析"
          }
        ]
      },
      project5: {
        title: "其他项目 / 功能性原型开发与技术验证合集",
        tag: "Prototypes & Game Jams / Multiple Engines",
        type: "独立游戏 / 原型测试",
        role: "全栈开发 / 机制验证 / 快速出样",
        time: "Ongoing",
        sections: [
          {
            heading: "1. 历届 Game Jam 快速白模原型沉淀",
            text: "这里包含了过去参与黑客马拉松及独立开发期间，快速迭代落地的多款实验性玩法核心机制原型，覆盖动态环境改变、连锁状态机等机制。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：复合式解谜触发 logic 与快速验证流程图"
          }
        ]
      },
      project6: {
        title: "关于我 / 马子潇 (Zixiao Ma)",
        tag: "Level Designer / Game Designer",
        type: "简历与专业特长简介",
        role: "关卡策划、核心机制设计",
        time: "2026 Portfolio",
        sections: [
          {
            heading: "专业背景与设计理念说明",
            text: "热爱构建具有深刻沉浸感与扎实物理手感的三维箱庭空间。擅长利用严谨的白模搭建（Blockout）、清晰的视线牵引以及基于玩家行为数据的盲测反馈，去驱动关卡的极致迭代。熟练掌握 Unreal Engine 5、Unity 等主流引擎与核心脚本工具。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=601' },
            caption: "▲ 致力于将最纯粹的游戏心流体验，传递给每一位在黑箱中探索的玩家。"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         【核心物理计算】：实时高斯毛玻璃滤镜圈——解算指针坐标 & 光学视差
         =================================================== */
      function updateLensPosition(e, item) {
        // 如果当前选项已被激活，强制将透镜锚定在几何中心，呈现完美对称锁死效果
        if (item.classList.contains('active')) {
          const rect = item.getBoundingClientRect();
          const cx = rect.width / 2;
          const cy = rect.height / 2;
          const lens = item.querySelector('.dynamic-glass-lens');
          const refractedImg = item.querySelector('.lens-refracted-img');
          
          lens.style.clipPath = `circle(120px at ${cx}px ${cy}px)`; 
          refractedImg.style.transformOrigin = `${cx}px ${cy}px`;
          return;
        }

        const rect = item.getBoundingClientRect();
        const x = e.clientX - rect.left; // 鼠标在卡片内的 X 轴物理坐标
        const y = e.clientY - rect.top;  // 鼠标在卡片内的 Y 轴物理坐标
        
        const lens = item.querySelector('.dynamic-glass-lens');
        const refractedImg = item.querySelector('.lens-refracted-img');

        // 1. 动态生成局部圆形透镜裁剪面，大小设为 64px 保证高密度的精致感
        lens.style.clipPath = `circle(64px at ${x}px ${y}px)`;
        
        // 2. 光学视差公式：通过改变变形基点（transform-origin），使内部放大图产生对抗鼠标的微位移，实现立体玻璃折射效果
        refractedImg.style.transformOrigin = `${x}px ${y}px`;
      }

      items.forEach(item => {
        item.addEventListener('mousemove', (e) => updateLensPosition(e, item));
        
        // 鼠标移出未激活项时重置
        item.addEventListener('mouseleave', () => {
          if (!item.classList.contains('active')) {
            const lens = item.querySelector('.dynamic-glass-lens');
            lens.style.clipPath = `circle(0px at 0px 0px)`;
          }
        });
      });

      // 初始化激活项位置（居中锁死）
      const initialActive = document.querySelector('.project-item.active');
      if (initialActive) {
        setTimeout(() => {
          const rect = initialActive.getBoundingClientRect();
          const lens = initialActive.querySelector('.dynamic-glass-lens');
          const refractedImg = initialActive.querySelector('.lens-refracted-img');
          lens.style.clipPath = `circle(150px at ${rect.width/2}px ${rect.height/2}px)`;
          refractedImg.style.transformOrigin = `${rect.width/2}px ${rect.height/2}px`;
        }, 100);
      }

      /* ===================================================
         2. 右侧数据生成引擎与联动逻辑
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
                <img src="${sec.media.src}" alt="关卡图示">
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          // 卸任前激活项，并将其圆圈隐去
          items.forEach(i => {
            i.classList.remove('active');
            i.querySelector('.dynamic-glass-lens').style.clipPath = `circle(0px at 0px 0px)`;
          });
          
          item.classList.add('active');
          
          // 将当前激活项的毛玻璃透镜永久全幅锁死在卡片中央
          const rect = item.getBoundingClientRect();
          const lens = item.querySelector('.dynamic-glass-lens');
          const refractedImg = item.querySelector('.lens-refracted-img');
          lens.style.clipPath = `circle(150px at ${rect.width/2}px ${rect.height/2}px)`;
          refractedImg.style.transformOrigin = `${rect.width/2}px ${rect.height/2}px`;

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
