<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zixiao Ma - Portfolio</title>
  <style>
    /* --- 1. Global Brutalist Reset & Industrial Grey Palette --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #2a2a2a; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. Header / Profile Bar --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* Main Container Layout */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #2a2a2a;
    }

    /* --- 3. Left Panel (Tab Items) --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #1a1a1a;
      background-color: #1a1a1a; 
      z-index: 50;
      perspective: 1200px; 
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3); 
    }
    
    .project-item {
      height: 16.66%; 
      width: 108%; 
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      background-color: #222222;
      overflow: visible;
      opacity: 1; 
      
      transform: translateX(-7.4%);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      
      /* Reset/Return Animation Curve */
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.3s ease;
    }
    .project-item:last-child {
      border-bottom: none;
    }
    
    /* Hover Animation state */
    .project-item:hover {
      transform: translateX(0);
      z-index: 60; 
      box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5); 
      transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .project-item.active {
      z-index: 55; 
    }
    
    /* 3D Card Container */
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      border: 0px solid transparent;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border 0.25s ease;
    }
    
    /* Active & Hover Border Highlight */
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 2px solid #ff5500; 
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      display: block;
      filter: none; 
    }

    /* Persistent Title Overlays */
    .item-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.2) 100%); 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 15px;
      text-align: center;
      opacity: 1; 
      pointer-events: none;
      transition: background 0.25s ease;
    }
    
    .project-item:hover .item-hover-overlay,
    .project-item.active .item-hover-overlay {
      background: rgba(0, 0, 0, 0.7); 
    }
    
    .item-hover-overlay span {
      color: #ffffff; 
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5); 
      transition: color 0.25s ease;
    }

    .project-item:hover .item-hover-overlay span,
    .project-item.active .item-hover-overlay span {
      color: #ff5500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* --- 4. Right Showcase Area --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #333333; 
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    /* Content Layout Wrapper */
    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    /* Headers and Metrics Breakdown */
    .project-title-area h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #ffffff; 
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #222222; 
      padding: 22px;
      border: 1px solid #444444;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .spec-cell p {
      font-size: 13.5px;
      color: #eeeeee;
      font-weight: 500;
    }

    /* Modular Content Blocks */
    .detail-section {
      margin-bottom: 65px;
    }
    .detail-section h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      border-left: 4px solid #ff5500; 
      padding-left: 12px;
      color: #ffffff;
    }
    .detail-section p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #cccccc; 
      margin-bottom: 25px;
      text-align: justify;
    }
    
    .highlight-text {
      color: #ff5500;
      font-weight: 600;
    }

    /* Media Containers */
    .showcase-block {
      width: 100%;
      border: 1px solid #444444;
      background: #222222;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11.5px;
      color: #999999;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>Zixiao Ma</h1>
      <p>Level Designer / Game Designer</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:marsshow2000@outlook.com">marsshow2000@outlook.com</a></p>
      <p>📱 (+1) 945-949-6840</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="Starfield Level Design">

        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=12" alt="Half-Life 2 Level Design">
          <div class="item-hover-overlay"><span>Half-Life 2 Level Design</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project3">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=13" alt="HamsterBallin'">
          <div class="item-hover-overlay"><span>UE5 3D Multiplayer Racing<br>HamsterBallin‘</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project4">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=14" alt="FLING">
          <div class="item-hover-overlay"><span>Unity 2D Platformer<br>FLING</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project5">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=15" alt="More Projects">
          <div class="item-hover-overlay"><span>More Projects</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project6">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=16" alt="About Me">
          <div class="item-hover-overlay"><span>About Me</span></div>
        </div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper"></div>
    </div>

  </div>

  <script>
    /* Portfolio Database Architecture */
    const portfolioDatabase = {
      project1: {
        title: "Starfield Level Design - Resource Outpost Exploration",
        tag: "Level Design Case Study / Starfield Theme",
        type: "3D Open World RPG Level",
        role: "Layout Design / Point of Interest Placement / Atmosphere",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. Core Mission Intent & Spatial Flow",
            text: "This layout prototype explicitly structures sandbox exploration in low-gravity celestial environments. Players leverage jetpack mechanics to navigate a defunct refinery vertically, where strategically applied <span class='highlight-text'>sightline occlusion</span> and complex ventilation passages carve out multiple high-reward stealth vectors.",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ Fig 1.1: Multi-tier blockout composition testing vertical movement limits."
          }
        ]
      },
      project2: {
        title: "Half-Life 2 Level Design - City 17 Industrial Breach",
        tag: "Classic Level Design / Source Engine Philosophy",
        type: "Linear First-Person Shooter",
        role: "Physics-Based Puzzles / Pacing & Combat Encounters",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. Gravity Gun Environmental Architecture",
            text: "Adhering strictly to Valve's signature mechanics-driven pacing, the layout features a closed water valve ecosystem that naturally guides players to employ buoying dynamics to build bridges. This puzzle sequence transitions smoothly into a Combine ambush, where physics props directly convert into <span class='highlight-text'>destructible tactical cover</span>.",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ Fig 2.1: Logic loop diagram mapping physics leverage and liquid buoyancy mechanics."
          }
        ]
      },
      project3: {
        title: "UE5 3D Multiplayer Racing - HamsterBallin‘",
        tag: "Gameplay & Level Mechanics / Unreal Engine 5",
        type: "3D Multiplayer Arcade Racing",
        role: "Curved Tracking / Collision Mesh Optimization / Handling Calibration",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. Managing High-Velocity Curvatures",
            text: "The definitive design problem was securing player agency and directional control under extreme velocities. Track borders rely on micro-sloped profiles to buffer centripetal displacement, deploying varying surface physics to afford expert players high-risk <span class='highlight-text'>tangential cutting paths</span> across hairpin loops.",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=302' },
            caption: "▲ Fig 3.1: High-velocity structural sweep showcasing geometry boundaries and trigger volume layout."
          }
        ]
      },
      project4: {
        title: "Unity 2D Platformer - FLING",
        tag: "2D Precision Platformer / Unity 2D",
        type: "Hardcore Precision Platformer",
        role: "Level Layout Configuration / Frame-Perfect Collision Tuning",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. Projectile Velocity & Frustration Management",
            text: "The foundational gameplay loop of FLING focuses on momentum and kinetic trajectory arcs. Every corridor coordinates 'launch, micro-correction, and micro-landing' patterns, inserting critical <span class='highlight-text'>buffer platforms</span> within lethal hazard fields to balance the steep difficulty scaling.",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ Fig 4.1: Vector mapping for launch variables contrasted against player telemetry models."
          }
        ]
      },
      project5: {
        title: "More Projects - Prototypes & System Sandboxes",
        tag: "Prototypes & Game Jam Works",
        type: "Multi-genre Gameplay Validation",
        role: "Rapid Prototyping / Core Mechanic Abstraction",
        time: "Ongoing",
        sections: [
          {
            heading: "1. Game Jam Mechanical Proof-of-Concepts",
            text: "A repository compiling diverse systemic prototypes developed during 48-hour sprints. Concepts investigate localized gravity inversion matrix setups and non-Euclidean perspective shift mechanics, emphasizing responsive, rapid-turnaround development practices.",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ Fig 5.1: Blockout structural inventory detailing spatial logic validation testing."
          }
        ]
      },
      project6: {
        title: "About Me / Profile & Design Philosophy",
        tag: "About Me / Resume & Core Credentials",
        type: "Personal Profile",
        role: "Level Designer",
        time: "Full-Time",
        sections: [
          {
            heading: "1. Professional Profile",
            text: "Level Designer at SMU Guildhall with a passion for exploration, player guidance, and environmental storytelling. Dedicated to crafting engaging and memorable gameplay experiences through level design.",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=601' },
            caption: "▲ Committed to refining pristine pacing frameworks and advanced space design."
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D Card Interactive Tilt Mechanical Engine
         =================================================== */
      function applyTiltEffect(itemElement, cardElement, maxRotate = 35, scale = 1.05) {
        itemElement.addEventListener('mousemove', (e) => {
          const rect = itemElement.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        itemElement.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            cardElement.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      
      items.forEach(item => {
        const card = item.querySelector('.project-item-card');
        applyTiltEffect(item, card, 35, 1.05); 
      });

      /* ===================================================
         2. Dynamic Content Assembler Engine
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>Project Type</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>Responsibilities</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>Timeline</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="Showcase Visual Asset">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      /* ===================================================
         3. Navigation Linkage / Tab Switching Controller
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      // Launch Initial View Configuration
      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
