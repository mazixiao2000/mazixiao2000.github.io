<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 全局极致主义重置 & 中度冷工业灰调体系 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #2a2a2a; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #2a2a2a;
    }

    /* --- 3. 左侧选项卡栏 --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #1a1a1a;
      background-color: #1a1a1a; 
      z-index: 50;
      perspective: 1200px; 
      box-shadow: 5px 0 25px rgba(0, 0, 0, 0.3); 
    }
    
    .project-item {
      /* 【修改】：6个选项卡平分高度 100% / 6 = 16.66% */
      height: 16.66%; 
      width: 108%; 
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1a1a1a;
      background-color: #222222;
      overflow: visible;
      opacity: 1; 
      
      transform: translateX(-7.4%);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      
      /* 退回动画 */
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 0.3s ease;
    }
    .project-item:last-child {
      border-bottom: none;
    }
    
    /* 鼠标悬停划出 */
    .project-item:hover {
      transform: translateX(0);
      z-index: 60; 
      box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.5); 
      transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .project-item.active {
      z-index: 55; 
    }
    
    /* 3D 卡牌联动容器 */
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      border: 0px solid transparent;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), border 0.25s ease;
    }
    
    /* 高亮橙色描边 */
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 2px solid #ff5500; 
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      display: block;
      filter: none; 
    }

    /* 【核心修改1】：文本遮罩控制层 —— 未选中也显示标题，且图片不全变暗 */
    .item-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* 默认状态：轻微的渐变底衬，保证白色文字在任何图片上都清晰可见，同时图片完全不失真变暗 */
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.1) 60%, rgba(0,0,0,0.2) 100%); 
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 15px;
      text-align: center;
      opacity: 1; /* 始终保持可见 */
      pointer-events: none;
      transition: background 0.25s ease;
    }
    
    /* 当悬停或激活时，可以适当对背景做加深响应，如不需要可以删掉此段 */
    .project-item:hover .item-hover-overlay,
    .project-item.active .item-hover-overlay {
      background: rgba(0, 0, 0, 0.65); 
    }
    
    .item-hover-overlay span {
      color: #ffffff; /* 默认状态下文字为白色以增强可读性 */
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.4;
      /* 文本阴影增加极端复杂背景下的可读性 */
      text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(0,0,0,0.5); 
      transition: color 0.25s ease;
    }

    /* 悬停或选中状态下，文字变为标志性橙色 */
    .project-item:hover .item-hover-overlay span,
    .project-item.active .item-hover-overlay span {
      color: #ff5500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* --- 4. 右侧展示区 --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #333333; 
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    /* 详情页排版包装器 */
    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    /* 大标题与参数表 */
    .project-title-area h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #ffffff; 
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #222222; 
      padding: 22px;
      border: 1px solid #444444;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .spec-cell p {
      font-size: 13.5px;
      color: #eeeeee;
      font-weight: 500;
    }

    /* 独立的图文拆解块 */
    .detail-section {
      margin-bottom: 65px;
    }
    .detail-section h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      border-left: 4px solid #ff5500; 
      padding-left: 12px;
      color: #ffffff;
    }
    .detail-section p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #cccccc; 
      margin-bottom: 25px;
      text-align: justify;
    }
    
    .highlight-text {
      color: #ff5500;
      font-weight: 600;
    }

    /* 媒体展示容器 */
    .showcase-block {
      width: 100%;
      border: 1px solid #444444;
      background: #222222;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11.5px;
      color: #999999;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>关卡策划 / 游戏设计</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="星空关卡设计">
          <div class="item-hover-overlay"><span>星空关卡设计</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project2">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=12" alt="半条命2关卡设计">
          <div class="item-hover-overlay"><span>半条命2关卡设计</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project3">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=13" alt="HamsterBallin">
          <div class="item-hover-overlay"><span>UE5 3D多人竞速<br>HamsterBallin‘</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project4">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=14" alt="FLING">
          <div class="item-hover-overlay"><span>Unity 2D平台跳跃<br>FLING</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project5">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=15" alt="更多项目">
          <div class="item-hover-overlay"><span>更多项目</span></div>
        </div>
      </div>
      <div class="project-item" data-id="project6">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=16" alt="关于我">
          <div class="item-hover-overlay"><span>关于我</span></div>
        </div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper"></div>
    </div>

  </div>

  <script>
    // 【核心修改2】：配套更新全新的 6 个关卡数据库内容
    const portfolioDatabase = {
      project1: {
        title: "星空关卡设计 - 开放宇宙资源站探索",
        tag: "Level Design Case Study / Starfield Theme",
        type: "3D 开放世界 RPG 关卡",
        role: "动线流线设计 / 资源点规划 / 氛围营造",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 关卡核心设计意图",
            text: "本关卡专注于模拟低重力地外行星环境。玩家需要利用宇航喷气背包在废弃的采矿枢纽中进行三维纵向探索，通过<span class='highlight-text'>视线阻断</span>与隐藏通风管道提供多样化的潜入路径。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ 图 1.1：低重力纵向探索动线白模推演"
          }
        ]
      },
      project2: {
        title: "半条命2关卡设计 - 17号城工业区突围",
        tag: "Classic Level Design / Source Engine Philosophy",
        type: "线性第一人称射击",
        role: "物理机关解谜 / 战斗节奏把控",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 经典重力枪物理交互设计",
            text: "秉承《Half-Life 2》的隐性教学理念，关卡前半段通过一处闭环水箱解谜教导玩家利用浮力物搭建桥梁，随后在后半段无缝引入联合军遭遇战，将物理交互转化为<span class='highlight-text'>战术掩体破坏</span>。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：基于物理杠杆与浮力装置的解谜闭环"
          }
        ]
      },
      project3: {
        title: "UE5 3D多人竞速游戏 - HamsterBallin‘",
        tag: "Gameplay & Level Mechanics / Unreal Engine 5",
        type: "3D 多人联机竞速",
        role: "高动态曲面设计 / 碰撞体边界优化 / 速度感调校",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 高动态仓鼠球速度包络曲线",
            text: "核心挑战在于在极端高时速下保持玩家对方向的控制力。关卡重度依赖跑道边缘的隐性弧度分流，利用物理表面材质的摩擦力差异，在弯道处为硬核玩家提供<span class='highlight-text'>‘极限切线切入点’</span>。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=302' },
            caption: "▲ 图 3.1：高流速曲面赛道与触发边界拓扑分析"
          }
        ]
      },
      project4: {
        title: "Unity 2D平台跳跃游戏 - FLING",
        tag: "2D Precision Platformer / Unity 2D",
        type: "硬核精密跳跃",
        role: "关卡配置 / 动态判定校准",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 弹性机制与手感缓释区",
            text: "FLING 的核心乐趣在于抛射带来的物理惯性。关卡设计围绕‘起跳-空中修正-精准落地’展开，在容错率极低的钉刺阵列中，精心预留了可反复微调手感的<span class='highlight-text'>平台缓冲区</span>。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：抛物线轨迹判定与关卡挫败感峰值控制图"
          }
        ]
      },
      project5: {
        title: "更多项目组件与独立原型沉淀",
        tag: "Prototypes & Game Jam Works",
        type: "多类型玩法验证",
        role: "快速原型搭建 / 核心玩法抽象",
        time: "Ongoing",
        sections: [
          {
            heading: "1. Game Jam 极限原型创意孵化",
            text: "这里收录了多款在 48 小时内孵化的关卡机制原型，涵盖了空间重力反转、多维度视差解谜等前沿探索，展现了快速敏捷迭代的工业开发能力。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：机制验证阶段的多构型白模归档"
          }
        ]
      },
      project6: {
        title: "关于我 / 教育背景与设计哲学",
        tag: "About Me / Resume & Design Philosophy",
        type: "个人档案",
        role: "关卡策划 / 游戏设计师",
        time: "Full-Time",
        sections: [
          {
            heading: "1. 设计哲学：用空间讲述属于玩家的故事",
            text: "我认为关卡策划是‘游戏世界沉默的导演’。优秀的关卡不应通过频繁的 UI 或台词强迫玩家，而是通过<span class='highlight-text'>光影、几何结构、AI 压制感</span>去激发玩家本能的探索欲与战斗心流。期待与优秀的团队一起构建令人沉浸的虚拟世界。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=601' },
            caption: "▲ 致力于打磨极致的心流曲线与黑箱关卡艺术"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D 卡牌微倾斜物理引擎（解耦外层位移，纯粹处理倾斜）
         =================================================== */
      function applyTiltEffect(itemElement, cardElement, maxRotate = 35, scale = 1.05) {
        itemElement.addEventListener('mousemove', (e) => {
          const rect = itemElement.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            cardElement.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        itemElement.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            cardElement.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      
      items.forEach(item => {
        const card = item.querySelector('.project-item-card');
        // 【核心修改3】：将 maxRotate 参数从原先的 24 提高到 35 度，悬停扭曲感更足
        applyTiltEffect(item, card, 35, 1.05); 
      });

      /* ===================================================
         2. 长轴多组件内容组装
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="关卡图示">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      /* ===================================================
         3. 选项卡联动切换
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
