<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 全局重置与冷工业灰调体系 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #1a1a1a; 
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏 --- */
    header {
      background-color: #ff5500; 
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; 
    }
    .profile-info p {
      font-size: 12px;
      letter-spacing: 1px;
      color: #000000; 
      font-weight: 600;
      opacity: 0.85;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #000000;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体布局 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #1a1a1a;
    }

    /* --- 3. 左侧选项卡栏（全新概念：极简暗色密铺 + 超维毛玻璃折射） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #262626;
      background-color: #111111; /* 极深底色，衬托毛玻璃 */
      z-index: 50;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    
    .project-item {
      height: 16.666%; /* 6个选项从上到下完美密铺 */
      width: 100%; 
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #1f1f1f;
      background-color: #161616; /* 常态暗黑密铺底色 */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 24px;
      overflow: visible;
      
      /* 去程利落，回程带有轻微物理阻尼 */
      transition: background-color 0.3s ease, transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.3s ease;
    }
    .project-item:last-child {
      border-bottom: none;
    }
    
    /* 常态下的底层静态文本 */
    .item-text-layer {
      font-size: 13.5px;
      font-weight: 600;
      color: #888888; /* 未悬停时低调的工业灰 */
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.4;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    /* 【核心特效层】：悬停与激活时的物理毛玻璃折射舱 */
    .glass-refractor {
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border-radius: 4px;
      
      /* 毛玻璃核心滤镜：模糊 + 强饱和度提升折射感 */
      backdrop-filter: blur(16px) saturate(190%) contrast(120%);
      -webkit-backdrop-filter: blur(16px) saturate(190%) contrast(120%);
      
      /* 晶体质感：带有反光边缘的微白渐变与微弱白微光 */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 26px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.0);
      
      /* 初始隐藏 */
      opacity: 0;
      transform: scale(0.96) translateZ(0);
      pointer-events: none;
      z-index: 10;
      
      /* 动效控制 */
      transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.25s ease, box-shadow 0.25s ease;
    }

    /* 毛玻璃舱内部的折射高亮文本（带放大与微光） */
    .glass-refractor span {
      color: #ffffff;
      font-size: 14.5px; /* 略微放大，模拟光线折射凸透镜效果 */
      font-weight: 700;
      letter-spacing: 1.5px;
      text-align: center;
      line-height: 1.4;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
      transform: scale(1);
      transition: transform 0.25s ease, color 0.25s ease;
    }

    /* 悬停状态（Hover）：形成尺寸稍大、内部折射、反光的毛玻璃效果 */
    .project-item:hover {
      z-index: 60;
    }
    .project-item:hover .glass-refractor {
      opacity: 1;
      /* 尺寸稍大（scale 1.04）并向前突起，形成立体折射层 */
      transform: scale(1.04) translateZ(20px);
      border-color: rgba(255, 85, 0, 0.4); /* 边缘带有一层淡淡的橙色反光折射 */
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    }
    .project-item:hover .item-text-layer {
      color: #ffffff;
      transform: scale(1.04);
    }

    /* 【核心修改】：当确定/激活某个选项时（Active），永久停留在超维毛玻璃状态上 */
    .project-item.active {
      background-color: #1e1e1e; /* 激活项底座微亮 */
      z-index: 55;
    }
    .project-item.active .glass-refractor {
      opacity: 1;
      transform: scale(1.04) translateZ(15px); /* 稳固停留在稍大且升起的折射形态 */
      background: linear-gradient(135deg, rgba(255, 85, 0, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%); /* 融入微弱的核心橙光折射 */
      border: 1px solid rgba(ff, 55, 0, 0.7);
      border-color: #ff5500; /* 标志性工业橙外边框锁定 */
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255, 85, 0, 0.05);
    }
    .project-item.active .glass-refractor span {
      color: #ff5500; /* 激活项文本变为核心橙色，极为耀眼 */
      text-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
    }
    .project-item.active .item-text-layer {
      opacity: 0; /* 激活后底层灰字完全让位给毛玻璃舱 */
    }

    /* --- 4. 右侧展示区 --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #222222; /* 调深右侧背景，加强整体统一的高级暗黑感 */
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    .detail-content-wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.25s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    .project-title-area h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      color: #ffffff; 
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 35px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #181818; 
      padding: 22px;
      border: 1px solid #333333;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; 
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .spec-cell p {
      font-size: 13.5px;
      color: #eeeeee;
      font-weight: 500;
    }

    .detail-section {
      margin-bottom: 65px;
    }
    .detail-section h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      border-left: 4px solid #ff5500; 
      padding-left: 12px;
      color: #ffffff;
    }
    .detail-section p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #cccccc; 
      margin-bottom: 25px;
      text-align: justify;
    }
    
    .highlight-text {
      color: #ff5500;
      font-weight: 600;
    }

    .showcase-block {
      width: 100%;
      border: 1px solid #333333;
      background: #181818;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11.5px;
      color: #888888;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>关卡策划 / 游戏设计</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="item-text-layer">星空关卡设计</div>
        <div class="glass-refractor"><span>星空关卡设计</span></div>
      </div>
      <div class="project-item" data-id="project2">
        <div class="item-text-layer">半条命关卡设计</div>
        <div class="glass-refractor"><span>半条命关卡设计</span></div>
      </div>
      <div class="project-item" data-id="project3">
        <div class="item-text-layer">UE5多人竞速游戏HamsterBallin‘</div>
        <div class="glass-refractor"><span>UE5多人竞速游戏HamsterBallin‘</span></div>
      </div>
      <div class="project-item" data-id="project4">
        <div class="item-text-layer">Unity2d平台跳跃游戏FLING</div>
        <div class="glass-refractor"><span>Unity2d平台跳跃游戏FLING</span></div>
      </div>
      <div class="project-item" data-id="project5">
        <div class="item-text-layer">其他项目</div>
        <div class="glass-refractor"><span>其他项目</span></div>
      </div>
      <div class="project-item" data-id="project6">
        <div class="item-text-layer">关于我</div>
        <div class="glass-refractor"><span>关于我</span></div>
      </div>
    </div>

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper">
        </div>
    </div>

  </div>

  <script>
    // 关卡数据库（保持完整的6项映射结构）
    const portfolioDatabase = {
      project1: {
        title: "星空关卡设计 / 开放宇宙前哨站动线",
        tag: "Level Design Study / Creation Engine",
        type: "科幻 RPG / 开放沙盒",
        role: "动线规划 / 隐性地标牵引 / 白模测试",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 低重力环境下的垂直动线与探索心流",
            text: "本设计旨在探索低重力场景下玩家的视线盲区与移动习惯。我们通过利用中高照度地标与环境气流，引导玩家在无UI状态下探索错落有致的废弃太空前哨站。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ 图 1.1：低重力前哨站垂直黑箱空间视线阻断推演"
          }
        ]
      },
      project2: {
        title: "半条命关卡设计 / 箱庭式遭遇战与隐性光影",
        tag: "Singleplayer Level / Source 2 Engine",
        type: "第一人称线性射击",
        role: "箱庭解谜 / AI视线包络 / 物理机关交互",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 经典 Cold-Warm 光源引导模型机制",
            text: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在全黑匿踪状态下，自然直觉地发现潜行暗道与战术掩体。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：经典箱庭空间下的交火线与掩体拓扑"
          }
        ]
      },
      project3: {
        title: "UE5 多人竞速游戏 HamsterBallin‘ / 高速度下视差载入与物理碰撞",
        tag: "Multiplayer Racing Game / Unreal Engine 5",
        type: "多人联机 3D 物理竞速",
        role: "关卡动态关卡流 / 极限速率验证 / 赛道盲测",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 高机动惯性运动下的赛道边界红线测试",
            text: "快速推演并验证在极高移动速率、滚动惯性下，赛道弯道弧度、高低落差对玩家操作手感和心流反馈带来的动态冲击。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=301' },
            caption: "▲ 图 3.1：高流速状态下 Stream Loading 的视差加载技术边界验证"
          }
        ]
      },
      project4: {
        title: "Unity 2D 平台跳跃游戏 FLING / 关卡难度阶梯与心流曲线构建",
        tag: "2D Platformer / Unity 3D",
        type: "硬核 2D 动作跳跃",
        role: "物理机制调优 / 障碍矩阵设计 / 关卡盲测迭代",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 基于‘观察-尝试-挫败-精通’的黄金心流循环",
            text: "针对 2D 刚体弹性机制进行微调，通过搭建精准到像素级的跳跃盲道，在前期关卡合理分布安全落脚点与挫败缓释区。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：盲测数据玩家死亡热力图（Heatmap）与难度回归曲线分析"
          }
        ]
      },
      project5: {
        title: "其他项目 / 功能性原型开发与技术验证合集",
        tag: "Prototypes & Game Jams / Multiple Engines",
        type: "独立游戏 / 原型测试",
        role: "全栈开发 / 机制验证 / 快速出样",
        time: "Ongoing",
        sections: [
          {
            heading: "1. 历届 Game Jam 快速白模原型沉淀",
            text: "这里包含了过去参与黑客马拉松及独立开发期间，快速迭代落地的多款实验性玩法核心机制原型，覆盖动态环境改变、连锁状态机等机制。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：复合式解谜触发 logic 与快速验证流程图"
          }
        ]
      },
      project6: {
        title: "关于我 / 马子潇 (Zixiao Ma)",
        tag: "Level Designer / Game Designer",
        type: "简历与专业特长简介",
        role: "关卡策划、核心机制设计",
        time: "2026 Portfolio",
        sections: [
          {
            heading: "专业背景与设计理念说明",
            text: "热爱构建具有深刻沉浸感与扎实物理手感的三维箱庭空间。擅长利用严谨的白模搭建（Blockout）、清晰的视线牵引以及基于玩家行为数据的盲测反馈，去驱动关卡的极致迭代。熟练掌握 Unreal Engine 5、Unity 等主流引擎与核心脚本工具。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=601' },
            caption: "▲ 致力于将最纯粹的游戏心流体验，传递给每一位在黑箱中探索的玩家。"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D 物理毛玻璃折射微偏角（微小的视觉折射倾斜感）
         =================================================== */
      items.forEach(item => {
        const glass = item.querySelector('.glass-refractor');
        const textInside = glass.querySelector('span');
        
        item.addEventListener('mousemove', (e) => {
          const rect = item.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const xc = x / rect.width - 0.5; // 水平偏离量
          
          // 悬停或者激活时，微量移动内部文本实现“折射视差错位”
          requestAnimationFrame(() => {
            textInside.style.transform = `translateX(${xc * 8}px) scale(1.02)`;
          });
        });
        
        item.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            textInside.style.transform = `translateX(0px) scale(1)`;
          });
        });
      });

      /* ===================================================
         2. 长轴多组件内容组装
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="关卡图示">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; 
        }, 120);
      }

      /* ===================================================
         3. 选项卡联动切换
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
