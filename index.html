<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>马子潇 - 个人作品集</title>
  <style>
    /* --- 1. 画廊级极简主义重置 & 工业灰调主题 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden; 
      background-color: #121212; /* 基底：极深工业灰 */
      color: #ffffff; 
      -webkit-font-smoothing: antialiased;
    }

    /* --- 2. 顶部个人信息栏（高亮震撼橙） --- */
    header {
      background-color: #ff5500; /* 亮橙色主基调 */
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 90px; 
      flex-shrink: 0;
      z-index: 30;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .profile-info h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 4px;
      color: #000000; /* 亮橙背景下使用纯黑文字，极具工业风冲击力 */
    }
    .profile-info p {
      font-size: 11px;
      letter-spacing: 1px;
      color: #222222; 
      font-weight: 600;
      text-transform: uppercase;
    }
    .contact-info {
      text-align: right;
      font-size: 11px;
      color: #222222;
      font-weight: 600;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .contact-info a {
      color: #000000;
      text-decoration: none;
      border-bottom: 1px solid #000000;
      transition: opacity 0.3s ease;
    }
    .contact-info a:hover {
      opacity: 0.6;
    }

    /* 主体网格容器 */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 90px); 
      background-color: #121212;
    }

    /* --- 3. 左侧一级菜单栏（3D 舞台） --- */
    .left-panel {
      width: 25%;
      height: 100%;
      display: flex;
      flex-direction: column; 
      overflow: visible; 
      border-right: 1px solid #282828;
      background-color: #161616;
      z-index: 25;
      perspective: 1000px; 
      box-shadow: 20px 0 45px rgba(0, 0, 0, 0.7); 
    }
    
    .project-item {
      height: 20%; 
      width: 100%;
      cursor: pointer;
      position: relative;
      border-bottom: 1px solid #222222;
      background-color: #161616;
      opacity: 0.4; 
      transform-style: preserve-3d;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-item:last-child {
      border-bottom: none;
    }
    .project-item:hover, .project-item.active {
      opacity: 1; 
      z-index: 50; 
    }
    
    .project-item-card {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
      transform-style: preserve-3d;
      pointer-events: none; 
      border: 1px solid rgba(255, 255, 255, 0);
      box-shadow: 0 0px 0px rgba(0, 0, 0, 0);
      transition: border 0.4s ease, box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .project-item:hover .project-item-card, 
    .project-item.active .project-item-card {
      border: 1px solid #ff5500; /* 激活或悬停时卡片边框亮起橙色 */
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
    }

    .project-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; 
      filter: grayscale(80%);
      transform: translateZ(0px) scale(1.02);
      transition: filter 0.6s ease, transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .project-item:hover img, .project-item.active img {
      filter: grayscale(20%);
      transform: translateZ(45px) scale(1.1); 
    }

    /* 悬停时在卡片中心浮现的文本遮罩层 */
    .item-hover-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(18, 18, 18, 0.85); /* 半透明水泥黑 */
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 20px;
      text-align: center;
      opacity: 0; /* 默认隐藏 */
      z-index: 10;
      transform: translateZ(50px); /* 让文字在3D空间中比图片更靠前，极具悬浮感 */
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .project-item:hover .item-hover-overlay,
    .project-item.active .item-hover-overlay {
      opacity: 1; /* 悬停和激活时浮现 */
    }
    .item-hover-overlay span {
      color: #ff5500; /* 悬浮字体使用橙色 */
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* --- 4. 右侧深度长轴滚动展示区（水泥灰） --- */
    .right-panel {
      width: 75%;
      height: 100%;
      background-color: #1a1a1a; /* 舒适的水泥暗灰 */
      overflow-y: auto; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* 优雅隐形滚动条 */
    .right-panel::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    .right-panel {
      -ms-overflow-style: none;  
      scrollbar-width: none;  
    }

    /* 详情页长轴排版包装器 */
    .detail-content-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px 120px 40px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    
    .content-fade {
      opacity: 0;
    }

    /* 关卡大标题与基本信息规格表 */
    .project-title-area h2 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .project-title-area .sub-tag {
      font-size: 12px;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .spec-table-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 50px;
      background: #121212;
      padding: 20px;
      border: 1px solid #282828;
    }
    .spec-cell h3 {
      font-size: 11px;
      color: #ff5500; /* 规格小标题高亮橙 */
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .spec-cell p {
      font-size: 13px;
      color: #dddddd;
    }

    /* 独立的图文拆解块 */
    .detail-section {
      margin-bottom: 60px;
    }
    .detail-section h4 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
      border-left: 3px solid #ff5500; /* 用橙色作为章节指示线 */
      padding-left: 12px;
      color: #ffffff;
    }
    .detail-section p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #aaaaaa;
      margin-bottom: 25px;
      text-align: justify;
    }

    /* 长图文媒体容器 */
    .showcase-block {
      width: 100%;
      border: 1px solid #282828;
      background: #121212;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .showcase-block img, .showcase-block video {
      width: 100%;
      display: block;
      height: auto;
    }
    .showcase-caption {
      font-size: 11px;
      color: #666666;
      text-align: center;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div class="profile-info">
      <h1>马子潇</h1>
      <p>Level Design / Game Design Portfolio</p>
    </div>
    <div class="contact-info">
      <p>📧 <a href="mailto:zixiaom@smu.edu">zixiaom@smu.edu</a></p>
      <p>📱 (+86) 13506692801</p>
    </div>
  </header>

  <div class="main-container">
    
    <div class="left-panel" id="leftPanel">
      <div class="project-item active" data-id="project1">
        <div class="project-item-card">
          <img src="https://picsum.photos/600/400?random=11" alt="项目一封面">

      <div class="project-item" data-id="project3">

    <div class="right-panel" id="rightPanel">
      <div class="detail-content-wrapper" id="detailContentWrapper">

  <script>
    const portfolioDatabase = {
      project1: {
        title: "01 / 核心关卡动线规划与多路径拆解",
        tag: "Level Design Case Study / Unreal Engine",
        type: "3D 动作冒险沙盒",
        role: "白模搭建 / 心流曲线 / 视线阻断",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 关卡核心设计意图与心流包络（Mission Intent）",
            text: "在此关卡设计中，核心目标是在高密度垂直空间（Verticality）中创造非线性的探索体验。我们拒绝了传统大世界平铺直叙的铺设，转而采用高度落差限制玩家早期的视线视野。通过强迫其使用侧向勾爪动线，平滑战斗遭遇前的紧张感，并为核心硬核潜行玩家留出了无伤绕过主战区的边缘盲道。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=101' },
            caption: "▲ 图 1.1：主干道动线与视线遮挡体（Blockout）空间结构推演"
          },
          {
            heading: "2. 隐性地标锚定法与三维视线引导（Landmark & Guidance）",
            text: "为了让玩家在长达 15 分钟的无 UI 沉浸状态下不产生迷失感，本关卡重度利用了“三维地标法”。无论玩家在战斗中跌落到哪一层地下裂缝，只要抬起视角，都能透过精心计算的岩石错位裂隙，直观看到核心高塔的顶端微光。这种视线牵引在 3D 复杂黑箱空间中提供了极为稳固的心理锚点。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=102' },
            caption: "▲ 图 1.2：灰模阶段视界载入与明暗对比度（High Contrast）测试"
          },
          {
            heading: "3. 物理环境交互与闭环逻辑验证",
            text: "关卡中段引入了一组具有连锁反应的复合几何机关。玩家需要通过重力箱体触发底层泄洪闸，进而利用浮力升起通路。以下视频展示了白模测试阶段针对触发器（Trigger Box）边界、物理状态机衔接流利度的极限手感测试。",
            media: { type: 'video', src: 'https://www.w3schools.com/html/mov_bbb.mp4' },
            caption: "▲ 演示 1.3：虚幻引擎环境白模触发逻辑与物理碰撞闭环演示"
          },
          {
            heading: "4. 战斗遭遇战（Encounter）空间战术包络",
            text: "遭遇战区域采用了经典的“下沉式斗兽场”与“高台狙击位”的复合布局。敌方 AI 刷新点被隐藏在视野盲区的双层回廊后。通过提供 3 处可破坏的悬挂重物环境物，引导玩家形成‘观察-规划-潜入-爆发战斗’的经典战术循环，避免陷入纯粹的消耗战。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=103' },
            caption: "▲ 图 1.4：遭遇战交火线（Fire-line）与掩体密度分布拓扑图"
          },
          {
            heading: "5. 复盘复盘与可迭代性优化数据（Post-Mortem）",
            text: "经过 10 名核心玩家的盲测（Playtest）数据反馈，原先第三阶段的滑索动线因倾角过陡（接近 45°），导致玩家容易产生视觉眩晕且极难在中途变换方向。团队随后在迭代中将滑索倾角放缓至 28°，并在动线中点增设了一个承托式的悬空木质脚手架作为手感缓释区，使得整体心流体验回归预期黄金线。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=104' },
            caption: "▲ 图 1.5：盲测热力图数据（Heatmap）与玩家挫败感峰值区间修正对比"
          }
        ]
      },
      project2: {
        title: "02 / 隐性光影引导机制",
        tag: "Lighting & Guidance / Frostbite Engine",
        type: "线性写实潜行谍战",
        role: "光照关卡规划 / AI视线控制",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 冷暖光源引导模型机制",
            text: "利用高对比度冷暖光源的自然交替与几何形态暗示，隐性引导玩家在无UI及全黑匿踪状态下，自然直觉地发现潜行暗道与安全屋区域。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=201' },
            caption: "▲ 图 2.1：高照度强对比下的隐蔽动线视域分析"
          }
        ]
      },
      project3: {
        title: "03 / 动态环境与复合解谜机制",
        tag: "Puzzle Mechanics / Unity 3D",
        type: "第一人称空间解谜",
        role: "关卡触发器逻辑 / 地形状态机",
        time: "4 Weeks",
        sections: [
          {
            heading: "1. 基于地形改变的空间闭环设计",
            text: "基于虚幻引擎重构的动态地形解锁与逻辑闭环机制。多维度呈现测试白模阶段的动画演绎，包含触发逻辑条件分支以及多段机关运作细节。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=302' },
            caption: "▲ 图 3.1：地形矩阵变动下的路径连接拓扑图"
          }
        ]
      },
      project4: {
        title: "04 / 沙盒遭遇战心流曲线",
        tag: "Combat Encounter / CryEngine",
        type: "开放世界多人射击",
        role: "沙盒遭遇战规划 / 掩体布局",
        time: "3 Weeks",
        sections: [
          {
            heading: "1. 空间掩体错落与敌方AI压制曲线",
            text: "基于动态心流缓释理论设计的敌方AI刷新与战术覆盖包络。通过空间掩体的高低落差分布，保证战斗高潮期与资源搜集舒缓期的优雅交替。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=401' },
            caption: "▲ 图 4.1：掩体视线死角与射击交火线空间包络分析"
          }
        ]
      },
      project5: {
        title: "05 / 垂直高低差沙盒移动验证",
        tag: "Movement Mechanics / Unreal Engine 5",
        type: "开放立体大世界赛博风",
        role: "机制手感验证 / 边界极限测试",
        time: "2 Weeks",
        sections: [
          {
            heading: "1. 高机动三维运动学关卡推演",
            text: "快速推演并验证大型开放立体城市中，钩爪机制、垂直滑索与滑翔翼系统在不同建筑密度、高差倾角下的移动速率、惯性衔接与操作爽感。",
            media: { type: 'image', src: 'https://picsum.photos/1920/1080?random=501' },
            caption: "▲ 图 5.1：极限速度移动下关卡视差载入（Stream Loading）边界红线测试"
          }
        ]
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      const items = document.querySelectorAll('.project-item');
      const rightPanel = document.getElementById('rightPanel');
      const wrapper = document.getElementById('detailContentWrapper');

      /* ===================================================
         1. 3D 卡牌倾斜计算引擎（完美保留左侧绝佳手感）
         =================================================== */
      function applyTiltEffect(element, maxRotate = 25, scale = 1.12) {
        element.addEventListener('mousemove', (e) => {
          const rect = element.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const xc = x / rect.width - 0.5;
          const yc = y / rect.height - 0.5;
          const rotateX = yc * -maxRotate; 
          const rotateY = xc * maxRotate;
          requestAnimationFrame(() => {
            element.style.transform = `scale(${scale}) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          });
        });
        element.addEventListener('mouseleave', () => {
          requestAnimationFrame(() => {
            element.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
          });
        });
      }
      items.forEach(item => applyTiltEffect(item, 28, 1.12));

      /* ===================================================
         2. 长轴多组件动态渲染装配
         =================================================== */
      function renderLongProjectPage(projectId) {
        const data = portfolioDatabase[projectId];
        if (!data) return;

        let htmlContent = `
          <div class="project-title-area">
            <h2>${data.title}</h2>
            <div class="sub-tag">${data.tag}</div>
          </div>
          
          <div class="spec-table-mini">
            <div class="spec-cell"><h3>项目类型</h3><p>${data.type}</p></div>
            <div class="spec-cell"><h3>负责模块</h3><p>${data.role}</p></div>
            <div class="spec-cell"><h3>研发测试周期</h3><p>${data.time}</p></div>
          </div>
        `;

        data.sections.forEach(sec => {
          htmlContent += `
            <div class="detail-section">
              <h4>${sec.heading}</h4>
              <p>${sec.text}</p>
              <div class="showcase-block">
          `;

          if (sec.media.type === 'video') {
            htmlContent += `<video controls autoplay loop muted src="${sec.media.src}"></video>`;
          } else {
            htmlContent += `<img src="${sec.media.src}" alt="关卡图示">`;
          }

          htmlContent += `
              </div>
              <div class="showcase-caption">${sec.caption}</div>
            </div>
          `;
        });

        // 柔和切入动效
        wrapper.classList.add('content-fade');
        setTimeout(() => {
          wrapper.innerHTML = htmlContent;
          wrapper.classList.remove('content-fade');
          rightPanel.scrollTop = 0; // 换项目时瞬间置顶
        }, 150);
      }

      /* ===================================================
         3. 选项卡核心联动
         =================================================== */
      items.forEach(item => {
        item.addEventListener('click', () => {
          if (item.classList.contains('active')) return;

          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');

          const projectId = item.getAttribute('data-id');
          renderLongProjectPage(projectId);
        });
      });

      // 初始化载入
      renderLongProjectPage('project1');
    });
  </script>
</body>
</html>
